name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Unit tests
            tasks: :app:testDebugUnitTest
          - name: Debug build
            tasks: :app:assembleDebug
          - name: Lint
            tasks: :app:lintDebug lintKotlin

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-37.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run ${{ matrix.name }}
        run: ./gradlew ${{ matrix.tasks }} --console=plain
