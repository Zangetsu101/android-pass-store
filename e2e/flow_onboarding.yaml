appId: com.zangetsu101.pass
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "> pass init"
    timeout: 8000
- tapOn: "> pass init"

# Step 1: Import GPG key from file
- assertVisible: "import from file"
- tapOn: "import from file"

# File picker — navigate to Downloads only if file not already visible
- runFlow:
    when:
      notVisible:
        text: "test-key.asc"
    commands:
      - tapOn: "Show roots"
      - extendedWaitUntil:
          visible:
            text: "Downloads"
          timeout: 5000
      - tapOn: "Downloads"
- extendedWaitUntil:
    visible:
      text: "test-key.asc"
    timeout: 5000
- tapOn: "test-key.asc"

# Confirm import
- assertVisible: "> gpg --import"
- tapOn: "> gpg --import"
- extendedWaitUntil:
    visible:
      text: "Key imported successfully."
    timeout: 10000

# Proceed to git init step
- tapOn: "> git init"

# Step 2: Enter repo URL and clone
# Note: if test-key.asc has an ed25519 auth subkey, a source toggle appears here.
# This flow uses the device key path (no passphrase needed).
# If auth subkey is detected, switch to device source before cloning.
- assertVisible: "git@github.com:"
- assertVisible: "user/pass-store.git"
- tapOn: "user/pass-store.git"
- inputText: "Zangetsu101/pass-test-store.git"
- tapOn: "> git clone"

- extendedWaitUntil:
    visible:
      text: "admin"
    timeout: 60000
