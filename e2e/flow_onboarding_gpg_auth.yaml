appId: com.zangetsu101.pass
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "> pass init"
    timeout: 8000
- tapOn: "> pass init"

# Step 1: Import GPG key with auth subkey from file
- assertVisible: "import from file"
- tapOn: "import from file"

# File picker — navigate to Downloads only if file not already visible
- runFlow:
    when:
      notVisible:
        text: "test-key-auth.asc"
    commands:
      - tapOn: "Show roots"
      - extendedWaitUntil:
          visible:
            text: "Downloads"
          timeout: 5000
      - tapOn: "Downloads"
- extendedWaitUntil:
    visible:
      text: "test-key-auth.asc"
    timeout: 5000
- tapOn: "test-key-auth.asc"

# Confirm import
- assertVisible: "> gpg --import"
- tapOn: "> gpg --import"
- extendedWaitUntil:
    visible:
      text: "key imported"
    timeout: 10000
- assertVisible: "store encrypted key"

# Proceed to git init step
- tapOn: "continue"

# Step 2: Enter repo URL — auth subkey detected, "gpg auth key" source selected by default
- assertVisible: "use gpg auth key"
- assertVisible: "git@github.com:"
- assertVisible: "user/pass-store.git"
- tapOn: "user/pass-store.git"
- inputText: "Zangetsu101/pass-test-store.git"
- tapOn: "> git clone"

# Step 3: Passphrase dialog — enter passphrase to extract auth subkey seed
- assertVisible: "gpg passphrase"
- tapOn: "passphrase"
- inputText: "testpass"
- tapOn: "confirm"

- extendedWaitUntil:
    visible:
      text: "alex\\.dev"
    timeout: 60000
