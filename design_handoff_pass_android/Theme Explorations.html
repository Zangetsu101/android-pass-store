<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pass Store — Theme Explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'DM Sans', sans-serif; }
</style>
</head>
<body>
<script type="text/babel">

// ─── Shared mock data ───────────────────────────────────────────────────────
const entries = [
  { path: "email/gmail", name: "gmail", folder: "email", time: "2h ago" },
  { path: "email/proton", name: "proton", folder: "email", time: "1d ago" },
  { path: "dev/github", name: "github", folder: "dev", time: "3d ago" },
  { path: "dev/npm", name: "npm", folder: "dev", time: "1w ago" },
  { path: "finance/revolut", name: "revolut", folder: "finance", time: "2w ago" },
  { path: "finance/wise", name: "wise", folder: "finance", time: "3w ago" },
  { path: "social/twitter", name: "twitter", folder: "social", time: "1mo ago" },
];

const folders = ["email", "dev", "finance", "social"];

// ─── Phone shell (shared) ────────────────────────────────────────────────────
function Phone({ children, bg = "#0d0d0d", statusBg, statusColor = "#fff" }) {
  return (
    <div style={{
      width: 320, height: 650,
      borderRadius: 40,
      background: "#1a1a1a",
      boxShadow: "0 0 0 2px #333, 0 32px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.08)",
      overflow: "hidden",
      display: "flex", flexDirection: "column",
      position: "relative",
    }}>
      {/* Notch */}
      <div style={{
        position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)",
        width: 100, height: 28, background: "#0d0d0d",
        borderBottomLeftRadius: 16, borderBottomRightRadius: 16,
        zIndex: 20,
      }} />
      {/* Status bar */}
      <div style={{
        height: 44, background: statusBg || bg,
        display: "flex", alignItems: "flex-end", paddingBottom: 6,
        paddingInline: 20, justifyContent: "space-between",
        flexShrink: 0, zIndex: 10,
      }}>
        <span style={{ color: statusColor, fontSize: 11, fontFamily: "'DM Sans', sans-serif", fontWeight: 500 }}>9:41</span>
        <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
          {/* signal */}
          {[3,4,5].map(h => <div key={h} style={{ width: 3, height: h, background: statusColor, borderRadius: 1, opacity: 0.9 }} />)}
          {/* wifi */}
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M6 8.5a1 1 0 1 0 0 2 1 1 0 0 0 0-2z" fill={statusColor} />
            <path d="M2.5 5.5C3.6 4.4 4.7 4 6 4s2.4.4 3.5 1.5" stroke={statusColor} strokeWidth="1.2" strokeLinecap="round" fill="none"/>
            <path d="M0.5 3.5C2 2 4 1 6 1s4 1 5.5 2.5" stroke={statusColor} strokeWidth="1.2" strokeLinecap="round" fill="none" opacity="0.5"/>
          </svg>
          {/* battery */}
          <div style={{ display: "flex", alignItems: "center", gap: 1 }}>
            <div style={{ width: 20, height: 10, border: `1.5px solid ${statusColor}`, borderRadius: 2.5, padding: 1.5, opacity: 0.9 }}>
              <div style={{ width: "70%", height: "100%", background: statusColor, borderRadius: 1 }} />
            </div>
            <div style={{ width: 2, height: 5, background: statusColor, borderRadius: 1, opacity: 0.6 }} />
          </div>
        </div>
      </div>
      {/* Content */}
      <div style={{ flex: 1, background: bg, overflowY: "auto", overflowX: "hidden" }}>
        {children}
      </div>
      {/* Nav bar */}
      <div style={{ height: 32, background: bg, display: "flex", justifyContent: "center", alignItems: "center", gap: 28, flexShrink: 0 }}>
        <div style={{ width: 18, height: 18, border: `1.5px solid ${statusColor}`, borderRadius: 4, opacity: 0.3 }} />
        <div style={{ width: 32, height: 4, background: statusColor, borderRadius: 4, opacity: 0.4 }} />
        <div style={{ width: 14, height: 14, borderRadius: "50%", border: `1.5px solid ${statusColor}`, opacity: 0.3 }} />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// THEME 1: TERMINAL
// ═══════════════════════════════════════════════════════════════════════════════
function TerminalTheme() {
  const T = {
    bg: "#0b0d0b",
    surface: "#0f120f",
    border: "#1e2a1e",
    accent: "#39ff6b",
    accentDim: "#39ff6b33",
    text: "#c8e6c9",
    textDim: "#4a6a4a",
    muted: "#2a3d2a",
    font: "'JetBrains Mono', monospace",
  };

  return (
    <Phone bg={T.bg} statusBg={T.bg} statusColor={T.accent}>
      <div style={{ fontFamily: T.font, display: "flex", flexDirection: "column", height: "100%" }}>
        {/* Header */}
        <div style={{ padding: "16px 20px 12px", borderBottom: `1px solid ${T.border}` }}>
          <div style={{ color: T.textDim, fontSize: 10, marginBottom: 4 }}>~/.password-store</div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ color: T.accent, fontSize: 13, fontWeight: 700 }}>pass</div>
              <div style={{ width: 6, height: 6, background: T.accent, borderRadius: "50%", boxShadow: `0 0 8px ${T.accent}` }} />
            </div>
            <div style={{ display: "flex", gap: 12 }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="5" stroke={T.textDim} strokeWidth="1.5"/>
                <line x1="11" y1="11" x2="14" y2="14" stroke={T.textDim} strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <line x1="3" y1="4" x2="13" y2="4" stroke={T.textDim} strokeWidth="1.5" strokeLinecap="round"/>
                <line x1="3" y1="8" x2="13" y2="8" stroke={T.textDim} strokeWidth="1.5" strokeLinecap="round"/>
                <line x1="3" y1="12" x2="9" y2="12" stroke={T.textDim} strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            </div>
          </div>
          {/* Search prompt */}
          <div style={{
            marginTop: 12, background: T.surface, border: `1px solid ${T.border}`,
            borderRadius: 4, padding: "8px 12px",
            display: "flex", alignItems: "center", gap: 8,
          }}>
            <span style={{ color: T.accent, fontSize: 11 }}>$</span>
            <span style={{ color: T.textDim, fontSize: 11 }}>grep -r ""</span>
            <span style={{ width: 7, height: 13, background: T.accent, animation: "blink 1s step-end infinite", opacity: 0.8 }} />
          </div>
        </div>

        {/* Folder groups */}
        <div style={{ flex: 1, overflowY: "auto", padding: "8px 0" }}>
          {folders.map(folder => (
            <div key={folder} style={{ marginBottom: 4 }}>
              {/* folder row */}
              <div style={{
                display: "flex", alignItems: "center", gap: 8,
                padding: "6px 20px", color: T.textDim, fontSize: 10,
              }}>
                <span style={{ color: T.accentDim.replace("33","66") }}>▶</span>
                <span style={{ color: T.accent, opacity: 0.6 }}>{folder}/</span>
              </div>
              {/* entries */}
              {entries.filter(e => e.folder === folder).map(e => (
                <div key={e.path} style={{
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "9px 20px 9px 36px",
                  borderBottom: `1px solid ${T.border}`,
                  cursor: "pointer",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ color: T.textDim, fontSize: 10 }}>├─</span>
                    <span style={{ color: T.text, fontSize: 12 }}>{e.name}</span>
                  </div>
                  <span style={{ color: T.textDim, fontSize: 9 }}>{e.time}</span>
                </div>
              ))}
            </div>
          ))}
        </div>

        {/* FAB */}
        <div style={{ padding: "12px 20px 8px", display: "flex", justifyContent: "flex-end" }}>
          <div style={{
            width: 44, height: 44, borderRadius: 4,
            background: T.accentDim, border: `1px solid ${T.accent}`,
            display: "flex", alignItems: "center", justifyContent: "center",
            color: T.accent, fontSize: 22, fontWeight: 300, cursor: "pointer",
            boxShadow: `0 0 16px ${T.accent}44`,
          }}>+</div>
        </div>
      </div>
    </Phone>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// THEME 2: VAULT
// ═══════════════════════════════════════════════════════════════════════════════
function VaultTheme() {
  const V = {
    bg: "#0e1220",
    surface: "#141929",
    card: "#181f33",
    border: "#232c47",
    accent: "oklch(0.72 0.18 250)",
    accentGlow: "oklch(0.72 0.18 250 / 0.25)",
    gold: "oklch(0.82 0.12 85)",
    text: "#e2e8f8",
    textDim: "#5c6b90",
    font: "'Syne', sans-serif",
    body: "'DM Sans', sans-serif",
  };

  const icons = { email: "✉", dev: "</>", finance: "◈", social: "◎" };

  return (
    <Phone bg={V.bg} statusBg={V.bg} statusColor={V.text}>
      <div style={{ fontFamily: V.body, display: "flex", flexDirection: "column", height: "100%" }}>
        {/* Header */}
        <div style={{
          padding: "14px 20px 16px",
          background: `linear-gradient(180deg, ${V.surface} 0%, ${V.bg} 100%)`,
        }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
            <div>
              <div style={{ color: V.textDim, fontSize: 9, fontFamily: V.font, letterSpacing: "0.15em", textTransform: "uppercase" }}>Password Store</div>
              <div style={{ color: V.text, fontSize: 18, fontFamily: V.font, fontWeight: 700, marginTop: 2 }}>Vault</div>
            </div>
            <div style={{
              width: 36, height: 36, borderRadius: 10,
              background: V.card, border: `1px solid ${V.border}`,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="5" stroke={V.textDim} strokeWidth="1.4"/>
                <line x1="11" y1="11" x2="14" y2="14" stroke={V.textDim} strokeWidth="1.4" strokeLinecap="round"/>
              </svg>
            </div>
          </div>

          {/* Stats strip */}
          <div style={{ display: "flex", gap: 8 }}>
            {[{ label: "Entries", val: "7" }, { label: "Folders", val: "4" }, { label: "GPG Key", val: "Active" }].map(s => (
              <div key={s.label} style={{
                flex: 1, background: V.card, borderRadius: 8, padding: "8px 10px",
                border: `1px solid ${V.border}`,
              }}>
                <div style={{ color: V.accent, fontSize: 13, fontWeight: 600, fontFamily: V.font }}>{s.val}</div>
                <div style={{ color: V.textDim, fontSize: 9, marginTop: 1 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* List */}
        <div style={{ flex: 1, overflowY: "auto", padding: "8px 16px" }}>
          {folders.map(folder => {
            const folderEntries = entries.filter(e => e.folder === folder);
            return (
              <div key={folder} style={{ marginBottom: 12 }}>
                <div style={{
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "4px 4px 8px",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ color: V.accent, fontSize: 11 }}>{icons[folder]}</span>
                    <span style={{ color: V.textDim, fontSize: 10, fontFamily: V.font, letterSpacing: "0.1em", textTransform: "uppercase" }}>{folder}</span>
                  </div>
                  <span style={{ color: V.textDim, fontSize: 9 }}>{folderEntries.length}</span>
                </div>
                <div style={{ background: V.card, borderRadius: 12, border: `1px solid ${V.border}`, overflow: "hidden" }}>
                  {folderEntries.map((e, i) => (
                    <div key={e.path} style={{
                      display: "flex", alignItems: "center", justifyContent: "space-between",
                      padding: "12px 14px",
                      borderBottom: i < folderEntries.length - 1 ? `1px solid ${V.border}` : "none",
                    }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{
                          width: 28, height: 28, borderRadius: 7,
                          background: V.border,
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: 10, color: V.accent,
                        }}>{e.name[0].toUpperCase()}</div>
                        <span style={{ color: V.text, fontSize: 13, fontWeight: 500 }}>{e.name}</span>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ color: V.textDim, fontSize: 10 }}>{e.time}</span>
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                          <path d="M4.5 9L7.5 6L4.5 3" stroke={V.textDim} strokeWidth="1.3" strokeLinecap="round"/>
                        </svg>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

        {/* Bottom bar */}
        <div style={{
          padding: "10px 16px 8px",
          borderTop: `1px solid ${V.border}`,
          display: "flex", justifyContent: "space-between", alignItems: "center",
          background: V.surface,
        }}>
          {["⊞", "🔐", "⚙"].map((icon, i) => (
            <div key={i} style={{
              flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
              color: i === 0 ? V.accent : V.textDim, fontSize: i === 0 ? 16 : 14,
            }}>
              <span>{icon}</span>
              <span style={{ fontSize: 8, fontFamily: V.font }}>
                {["Store", "Generate", "Settings"][i]}
              </span>
            </div>
          ))}
        </div>
      </div>
    </Phone>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// THEME 3: FROST
// ═══════════════════════════════════════════════════════════════════════════════
function FrostTheme() {
  const F = {
    bg: "#f4f6fa",
    surface: "#ffffff",
    card: "#ffffff",
    border: "#e4e8f0",
    accent: "oklch(0.52 0.2 255)",
    accentLight: "oklch(0.94 0.05 255)",
    accentText: "oklch(0.42 0.2 255)",
    text: "#1a1f2e",
    textDim: "#8892aa",
    body: "'DM Sans', sans-serif",
  };

  const folderColors = {
    email: "oklch(0.6 0.18 300)",
    dev: "oklch(0.55 0.2 160)",
    finance: "oklch(0.62 0.18 55)",
    social: "oklch(0.6 0.2 30)",
  };

  return (
    <Phone bg={F.bg} statusBg={F.bg} statusColor={F.text}>
      <div style={{ fontFamily: F.body, display: "flex", flexDirection: "column", height: "100%" }}>
        {/* Header */}
        <div style={{ padding: "14px 20px 12px", background: F.surface, borderBottom: `1px solid ${F.border}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ color: F.textDim, fontSize: 10 }}>Unlocked · GPG active</div>
              <div style={{ color: F.text, fontSize: 20, fontWeight: 700, marginTop: 1 }}>Passwords</div>
            </div>
            <div style={{
              width: 36, height: 36, borderRadius: 18,
              background: F.accentLight,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="5" stroke={F.accent} strokeWidth="1.6"/>
                <line x1="11" y1="11" x2="14" y2="14" stroke={F.accent} strokeWidth="1.6" strokeLinecap="round"/>
              </svg>
            </div>
          </div>

          {/* Search */}
          <div style={{
            marginTop: 10, background: F.bg, border: `1.5px solid ${F.border}`,
            borderRadius: 12, padding: "9px 14px",
            display: "flex", alignItems: "center", gap: 8,
          }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <circle cx="6" cy="6" r="4.5" stroke={F.textDim} strokeWidth="1.4"/>
              <line x1="9.5" y1="9.5" x2="12" y2="12" stroke={F.textDim} strokeWidth="1.4" strokeLinecap="round"/>
            </svg>
            <span style={{ color: F.textDim, fontSize: 12 }}>Search entries…</span>
          </div>
        </div>

        {/* Filter chips */}
        <div style={{ padding: "10px 20px", background: F.surface, borderBottom: `1px solid ${F.border}`, display: "flex", gap: 6 }}>
          {["All", "Recent", ...folders].map((chip, i) => (
            <div key={chip} style={{
              padding: "4px 10px", borderRadius: 20, fontSize: 10, fontWeight: 500,
              background: i === 0 ? F.accent : F.bg,
              color: i === 0 ? "#fff" : F.textDim,
              border: i === 0 ? "none" : `1px solid ${F.border}`,
              whiteSpace: "nowrap",
            }}>{chip}</div>
          ))}
        </div>

        {/* List */}
        <div style={{ flex: 1, overflowY: "auto", padding: "12px 20px" }}>
          {folders.map(folder => (
            <div key={folder} style={{ marginBottom: 16 }}>
              <div style={{
                display: "flex", alignItems: "center", gap: 8, marginBottom: 8,
              }}>
                <div style={{ width: 3, height: 12, background: folderColors[folder], borderRadius: 2 }} />
                <span style={{ color: F.textDim, fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em" }}>{folder}</span>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                {entries.filter(e => e.folder === folder).map(e => (
                  <div key={e.path} style={{
                    background: F.card, borderRadius: 10,
                    border: `1px solid ${F.border}`,
                    padding: "11px 14px",
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{
                        width: 30, height: 30, borderRadius: 8,
                        background: `${folderColors[folder]}18`,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        color: folderColors[folder], fontSize: 12, fontWeight: 700,
                      }}>{e.name[0].toUpperCase()}</div>
                      <div>
                        <div style={{ color: F.text, fontSize: 13, fontWeight: 500 }}>{e.name}</div>
                        <div style={{ color: F.textDim, fontSize: 10, marginTop: 1 }}>{e.path}</div>
                      </div>
                    </div>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                      <path d="M5 10.5L8.5 7L5 3.5" stroke={F.textDim} strokeWidth="1.4" strokeLinecap="round"/>
                    </svg>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>

        {/* FAB */}
        <div style={{ position: "absolute", bottom: 48, right: 20 }}>
          <div style={{
            width: 48, height: 48, borderRadius: 14,
            background: F.accent,
            display: "flex", alignItems: "center", justifyContent: "center",
            color: "#fff", fontSize: 24, fontWeight: 300,
            boxShadow: `0 6px 20px oklch(0.52 0.2 255 / 0.4)`,
          }}>+</div>
        </div>
      </div>
    </Phone>
  );
}

// ─── Canvas ──────────────────────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas title="Pass Store — Theme Explorations">
      <DCSection id="themes" title="Theme Directions">
        <DCArtboard id="terminal" label="01 · Terminal" width={320} height={700}>
          <TerminalTheme />
        </DCArtboard>
        <DCArtboard id="vault" label="02 · Vault" width={320} height={700}>
          <VaultTheme />
        </DCArtboard>
        <DCArtboard id="frost" label="03 · Frost" width={320} height={700}>
          <FrostTheme />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<style>
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
<div id="root"></div>
</body>
</html>
