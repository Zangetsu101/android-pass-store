<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pass Store — Light Theme</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e8e4dc; font-family: 'JetBrains Mono', monospace; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── Theme A: Paper Terminal ───────────────────────────────────────────────────
const PA = {
  bg:       "#f5f2eb",
  surface:  "#ede9e0",
  raised:   "#e8e4db",
  border:   "#d4cfc4",
  border2:  "#c8c2b5",
  accent:   "#1a6b3c",
  accentDim:"#1a6b3c18",
  accentMid:"#1a6b3c35",
  text:     "#1c1a16",
  textDim:  "#7a7265",
  textFaint:"#b0a898",
  danger:   "#c0392b",
  warn:     "#b7791f",
  mono:     "'JetBrains Mono', monospace",
  r:        4,
};

// ── Theme B: Phosphor Light ───────────────────────────────────────────────────
const PB = {
  bg:       "#f0f4f0",
  surface:  "#e8ede8",
  raised:   "#e2e8e2",
  border:   "#ccd8cc",
  border2:  "#b8ccb8",
  accent:   "#0d5c2e",
  accentDim:"#0d5c2e15",
  accentMid:"#0d5c2e30",
  text:     "#0a1a0f",
  textDim:  "#5a7a5a",
  textFaint:"#9ab89a",
  danger:   "#b83232",
  warn:     "#a06820",
  mono:     "'JetBrains Mono', monospace",
  r:        4,
};

// ── Shared phone shell ────────────────────────────────────────────────────────
function Phone({ children, T, darkBezel=true }) {
  const bezelBg = darkBezel ? "#1a1a1a" : "#c8c2b5";
  const bezelShadow = darkBezel
    ? "0 0 0 1.5px #2a2a2a, 0 0 0 3px #111, 0 40px 100px rgba(0,0,0,0.5)"
    : "0 0 0 1.5px #b8b4ac, 0 0 0 3px #a8a49c, 0 40px 100px rgba(0,0,0,0.18)";
  const punch = darkBezel ? "#0a0a0a" : "#b0aa9f";
  const navFaint = darkBezel ? "#3a3a3a" : T.textFaint;
  return (
    <div style={{
      width: 320, height: 680,
      borderRadius: 38,
      background: bezelBg,
      boxShadow: bezelShadow,
      display: "flex", flexDirection: "column",
      overflow: "hidden", position: "relative",
      fontFamily: T.mono,
    }}>
      <div style={{ position:"absolute", top:12, left:"50%", transform:"translateX(-50%)", width:10, height:10, borderRadius:"50%", background:punch, zIndex:30 }} />
      <div style={{
        height:36, background:T.bg, flexShrink:0, zIndex:10,
        display:"flex", alignItems:"flex-end", paddingBottom:5, paddingInline:18,
        justifyContent:"space-between",
      }}>
        <span style={{color:T.textDim, fontSize:10}}>9:41</span>
        <div style={{display:"flex", gap:4, alignItems:"center"}}>
          {[3,5,7].map(h=><div key={h} style={{width:3,height:h,background:T.textDim,borderRadius:1}}/>)}
          <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
            <path d="M5.5 7.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5z" fill={T.textDim}/>
            <path d="M2 4.5C3 3.4 4.2 3 5.5 3s2.5.4 3.5 1.5" stroke={T.textDim} strokeWidth="1.1" strokeLinecap="round" fill="none"/>
            <path d="M0 2C1.6.5 3.4 0 5.5 0s3.9.5 5.5 2" stroke={T.textDim} strokeWidth="1.1" strokeLinecap="round" fill="none" opacity=".4"/>
          </svg>
          <div style={{display:"flex",alignItems:"center",gap:1}}>
            <div style={{width:18,height:9,border:`1.2px solid ${T.textDim}`,borderRadius:2,padding:1.5}}>
              <div style={{width:"65%",height:"100%",background:T.textDim,borderRadius:1}}/>
            </div>
          </div>
        </div>
      </div>
      <div style={{flex:1, background:T.bg, overflowY:"auto", overflowX:"hidden", position:"relative"}}>
        {children}
      </div>
      <div style={{height:28, background:T.bg, flexShrink:0, display:"flex", justifyContent:"center", alignItems:"center", gap:24, borderTop:`1px solid ${T.border}`}}>
        <div style={{width:16,height:16,border:`1.2px solid ${navFaint}`,borderRadius:3}}/>
        <div style={{width:28,height:3,background:navFaint,borderRadius:4}}/>
        <div style={{width:12,height:12,borderRadius:"50%",border:`1.2px solid ${navFaint}`}}/>
      </div>
    </div>
  );
}

const storeData = [
  { folder:"email",   entries:["gmail","proton","hey"] },
  { folder:"dev",     entries:["github","npm","pypi"] },
  { folder:"finance", entries:["revolut","wise"] },
  { folder:"social",  entries:["twitter","mastodon"] },
];

const flatEntries = [
  {name:"github", path:"dev/github", time:"3d"},
  {name:"gmail",  path:"email/gmail", time:"2h"},
  {name:"hey",    path:"email/hey", time:"1w"},
  {name:"revolut",path:"finance/revolut", time:"2w"},
  {name:"npm",    path:"dev/npm", time:"5d"},
  {name:"proton", path:"email/proton", time:"1d"},
  {name:"wise",   path:"finance/wise", time:"1mo"},
];

// ── Gear icon ─────────────────────────────────────────────────────────────────
const GearIcon = ({C}) => (
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
    <path d="M5.5 1.5h3l.4 1.4c.3.1.6.3.9.5l1.4-.4 1.5 2.5-1 1c0 .3.1.6.1.9s0 .6-.1.9l1 1-1.5 2.5-1.4-.4c-.3.2-.6.4-.9.5l-.4 1.4h-3l-.4-1.4a4 4 0 0 1-.9-.5l-1.4.4L1.2 9.4l1-.9a4 4 0 0 1-.1-.9c0-.3 0-.6.1-.9l-1-1 1.5-2.5 1.4.4c.3-.2.6-.4.9-.5l.5-1.6z" stroke={C} strokeWidth="1.1" strokeLinejoin="round"/>
    <circle cx="7" cy="7" r="1.8" stroke={C} strokeWidth="1.1"/>
  </svg>
);

// ── Home Tree ─────────────────────────────────────────────────────────────────
function HomeTree({ T, darkBezel=true }) {
  return (
    <Phone T={T} darkBezel={darkBezel}>
      <div style={{display:"flex", flexDirection:"column", height:"100%"}}>
        <div style={{
          padding:"12px 18px 10px", borderBottom:`1px solid ${T.border}`,
          display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0,
          background:T.bg,
        }}>
          <div>
            <div style={{color:T.textDim, fontSize:9, letterSpacing:"0.1em"}}>~/.password-store</div>
            <div style={{color:T.accent, fontSize:14, fontWeight:700, marginTop:1}}>
              pass<span style={{color:T.textDim, fontWeight:300}}>.android</span>
            </div>
          </div>
          <div style={{display:"flex", gap:10, alignItems:"center"}}>
            <div style={{display:"flex", alignItems:"center", gap:5, background:T.surface, border:`1px solid ${T.border2}`, borderRadius:T.r, padding:"5px 9px"}}>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                <path d="M9.5 5.5A4 4 0 1 1 7 2" stroke={T.textDim} strokeWidth="1.2" strokeLinecap="round"/>
                <path d="M7 2l1 2.5-2.5.5" stroke={T.textDim} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              <span style={{color:T.textDim, fontSize:9}}>sync</span>
            </div>
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <rect x="0.5" y="0.5" width="5" height="5" rx="1" stroke={T.accent} strokeWidth="1.1"/>
              <rect x="7.5" y="0.5" width="5" height="5" rx="1" stroke={T.textDim} strokeWidth="1.1"/>
              <rect x="0.5" y="7.5" width="5" height="5" rx="1" stroke={T.textDim} strokeWidth="1.1"/>
              <rect x="7.5" y="7.5" width="5" height="5" rx="1" stroke={T.textDim} strokeWidth="1.1"/>
            </svg>
            <GearIcon C={T.textDim}/>
          </div>
        </div>
        <div style={{padding:"8px 18px", borderBottom:`1px solid ${T.border}`, flexShrink:0, background:T.bg}}>
          <div style={{background:T.surface, border:`1px solid ${T.border2}`, borderRadius:T.r, padding:"7px 12px", display:"flex", alignItems:"center", gap:8}}>
            <span style={{color:T.textDim, fontSize:11}}>$</span>
            <span style={{color:T.textDim, fontSize:11}}>grep -r ""</span>
            <span style={{width:6,height:12,background:T.accent,display:"inline-block",animation:"blink 1s step-end infinite",opacity:0.6}}/>
          </div>
        </div>
        <div style={{flex:1, overflowY:"auto", padding:"6px 0"}}>
          {storeData.map(({folder, entries}) => (
            <div key={folder}>
              <div style={{display:"flex", alignItems:"center", gap:8, padding:"7px 18px"}}>
                <span style={{color:T.accentMid.replace("35","99"), fontSize:10}}>▼</span>
                <span style={{color:T.accent, fontSize:11, opacity:0.8}}>{folder}/</span>
                <span style={{color:T.textFaint, fontSize:9, marginLeft:"auto"}}>{entries.length}</span>
              </div>
              {entries.map((e,i) => (
                <div key={e} style={{
                  display:"flex", alignItems:"center",
                  padding:"8px 18px 8px 40px",
                  borderBottom:`1px solid ${T.border}`,
                  background: e==="gmail" ? T.accentDim : "transparent",
                }}>
                  <span style={{color:T.textFaint, fontSize:10, marginRight:8}}>{i<entries.length-1?"├─":"└─"}</span>
                  <span style={{color: e==="gmail" ? T.accent : T.text, fontSize:11, flex:1}}>{e}</span>
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                    <path d="M3.5 8L6.5 5L3.5 2" stroke={T.textFaint} strokeWidth="1.2" strokeLinecap="round"/>
                  </svg>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </Phone>
  );
}

// ── Entry Detail ──────────────────────────────────────────────────────────────
function EntryDetail({ T }) {
  return (
    <Phone T={T}>
      <div style={{display:"flex", flexDirection:"column", height:"100%"}}>
        <div style={{
          padding:"12px 18px 10px", borderBottom:`1px solid ${T.border}`,
          display:"flex", alignItems:"center", gap:10, flexShrink:0,
        }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M9 11L5 7L9 3" stroke={T.textDim} strokeWidth="1.4" strokeLinecap="round"/>
          </svg>
          <div style={{flex:1}}>
            <div style={{color:T.textDim, fontSize:9}}>email/gmail</div>
            <div style={{color:T.accent, fontSize:14, fontWeight:700}}>gmail</div>
          </div>
        </div>
        <div style={{flex:1, overflowY:"auto", padding:"16px 18px"}}>
          {/* label */}
          <div style={{color:T.accent, fontSize:9, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6, fontWeight:600}}>password</div>
          <div style={{background:T.surface, border:`1px solid ${T.border2}`, borderRadius:T.r, padding:"12px 14px", marginBottom:6}}>
            <div style={{color:T.accent, fontSize:13, fontWeight:500, letterSpacing:"0.1em", filter:"blur(5px)", userSelect:"none", marginBottom:8}}>P@ssw0rd!Secure2024</div>
            <div style={{display:"flex", gap:6}}>
              <div style={{flex:1, background:T.accentDim, border:`1px solid ${T.accentMid}`, borderRadius:T.r-1, padding:"6px 10px", color:T.accent, fontSize:9, textAlign:"center", fontWeight:600}}>copy</div>
              <div style={{flex:1, background:T.surface, border:`1px solid ${T.border2}`, borderRadius:T.r-1, padding:"6px 10px", color:T.textDim, fontSize:9, textAlign:"center"}}>reveal</div>
            </div>
          </div>
          <div style={{color:T.textFaint, fontSize:9, marginBottom:18}}>decrypted in-memory · auto-clears in 45s</div>

          <div style={{color:T.accent, fontSize:9, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6, fontWeight:600}}>metadata</div>
          <div style={{background:T.surface, border:`1px solid ${T.border2}`, borderRadius:T.r, overflow:"hidden", marginBottom:16}}>
            {[["path","email/gmail"],["modified","2024-11-03"],["git commit","a3f92b1"]].map(([k,v],i,arr)=>(
              <div key={k} style={{display:"flex", padding:"9px 14px", borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none"}}>
                <span style={{color:T.textDim, fontSize:10, width:72, flexShrink:0}}>{k}</span>
                <span style={{color:T.text, fontSize:10}}>{v}</span>
              </div>
            ))}
          </div>

          <div style={{color:T.accent, fontSize:9, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6, fontWeight:600}}>notes</div>
          <div style={{background:T.surface, border:`1px solid ${T.border2}`, borderRadius:T.r, padding:"12px 14px", minHeight:60}}>
            <div style={{color:T.textDim, fontSize:11, lineHeight:1.7}}>
              recovery: alice+recover@gmail.com<br/>
              <span style={{color:T.textFaint}}>2fa via backup codes in bitwarden</span>
            </div>
          </div>
        </div>
      </div>
    </Phone>
  );
}

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({ T }) {
  const Toggle = ({on}) => (
    <div style={{width:32, height:18, borderRadius:9, background: on ? T.accent : T.border2, position:"relative", flexShrink:0}}>
      <div style={{width:12, height:12, borderRadius:"50%", background: on ? T.bg : T.surface, position:"absolute", top:3, left: on ? 17 : 3, border:`1px solid ${on ? T.accentMid : T.border}`}}/>
    </div>
  );
  const Row = ({label, value, danger, static:isStatic, toggle, toggleOn}) => (
    <div style={{display:"flex", alignItems:"center", padding:"11px 14px", borderBottom:`1px solid ${T.border}`}}>
      <span style={{color: danger ? T.danger : T.text, fontSize:11, flex:1}}>{label}</span>
      {value && <span style={{color:T.textDim, fontSize:10, marginRight:6}}>{value}</span>}
      {toggle && <Toggle on={toggleOn}/>}
      {!danger && !isStatic && !toggle && <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M3.5 8L6.5 5L3.5 2" stroke={T.textFaint} strokeWidth="1.2" strokeLinecap="round"/>
      </svg>}
    </div>
  );

  return (
    <Phone T={T}>
      <div style={{display:"flex", flexDirection:"column", height:"100%"}}>
        <div style={{padding:"12px 18px 10px", borderBottom:`1px solid ${T.border}`, flexShrink:0}}>
          <div style={{color:T.accent, fontSize:14, fontWeight:700}}>settings</div>
        </div>
        <div style={{flex:1, overflowY:"auto", padding:"12px 18px"}}>
          {[
            {label:"git", rows:[
              {label:"remote url", value:"github.com:user/…", static:true},
              {label:"ssh key", value:"ed25519", static:true},
              {label:"pull on open", toggle:true, toggleOn:false},
            ]},
            {label:"gpg", rows:[
              {label:"key id", value:"A3F9 2B1C", static:true},
              {label:"uid", value:"alice@example.com", static:true},
            ]},
            {label:"display", rows:[
              {label:"default view", value:"tree"},
              {label:"clipboard timeout", value:"45s"},
              {label:"session timeout", value:"30 min"},
              {label:"biometric unlock", toggle:true, toggleOn:false},
            ]},
            {label:"store", rows:[
              {label:"delete local store", danger:true},
            ]},
          ].map(section => (
            <div key={section.label}>
              <div style={{color:T.accent, fontSize:9, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6, fontWeight:600}}>{section.label}</div>
              <div style={{background:T.surface, border:`1px solid ${T.border2}`, borderRadius:T.r, overflow:"hidden", marginBottom:14}}>
                {section.rows.map(r => <Row key={r.label} {...r}/>)}
              </div>
            </div>
          ))}
          <div style={{textAlign:"center", color:T.textFaint, fontSize:9, marginTop:4}}>
            pass.android · v0.1.0 · linux pass compatible
          </div>
        </div>
      </div>
    </Phone>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas title="Pass Store — Light Theme Exploration">
      <DCSection id="bezel" title="Paper Terminal — Bezel Comparison">
        <DCArtboard id="b1" label="Dark Bezel" width={320} height={720}>
          <HomeTree T={PA} darkBezel={true}/>
        </DCArtboard>
        <DCArtboard id="b2" label="Light Bezel" width={320} height={720}>
          <HomeTree T={PA} darkBezel={false}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="paper" title="Paper Terminal — warm off-white, forest green">
        <DCArtboard id="p1" label="Home — Dark bezel" width={320} height={720}>
          <HomeTree T={PA} darkBezel={true}/>
        </DCArtboard>
        <DCArtboard id="p1b" label="Home — Light bezel" width={320} height={720}>
          <HomeTree T={PA} darkBezel={false}/>
        </DCArtboard>
        <DCArtboard id="p2" label="Entry Detail" width={320} height={720}>
          <EntryDetail T={PA}/>
        </DCArtboard>
        <DCArtboard id="p3" label="Settings" width={320} height={720}>
          <Settings T={PA}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="phosphor" title="Phosphor Light — cool green-grey, deep green">
        <DCArtboard id="ph1" label="Home — Tree" width={320} height={720}>
          <HomeTree T={PB}/>
        </DCArtboard>
        <DCArtboard id="ph2" label="Entry Detail" width={320} height={720}>
          <EntryDetail T={PB}/>
        </DCArtboard>
        <DCArtboard id="ph3" label="Settings" width={320} height={720}>
          <Settings T={PB}/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
