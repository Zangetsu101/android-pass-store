<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pass Store — Screens</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'JetBrains Mono', monospace; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes scanline { 0%{transform:translateY(-100%)} 100%{transform:translateY(100vh)} }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes loading-bar { 0%{transform:translateX(-100%)} 60%{transform:translateX(200%)} 100%{transform:translateX(200%)} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── Theme tokens ─────────────────────────────────────────────────────────────
const DARK_T = {
  bg:       "#0b0d0b",
  surface:  "#0f120f",
  raised:   "#131a13",
  border:   "#1d2b1d",
  border2:  "#243324",
  accent:   "#39ff6b",
  accentDim:"#39ff6b20",
  accentMid:"#39ff6b44",
  text:     "#c8e6c9",
  textDim:  "#527a52",
  textFaint:"#2e4a2e",
  danger:   "#ff5555",
  warn:     "#ffcc44",
  mono:     "'JetBrains Mono', monospace",
  r:        4,
};

const LIGHT_T = {
  bg:       "#f5f2eb",
  surface:  "#ede9e0",
  raised:   "#e8e4db",
  border:   "#d4cfc4",
  border2:  "#c8c2b5",
  accent:   "#1a6b3c",
  accentDim:"#1a6b3c18",
  accentMid:"#1a6b3c35",
  text:     "#1c1a16",
  textDim:  "#7a7265",
  textFaint:"#b0a898",
  danger:   "#c0392b",
  warn:     "#b7791f",
  mono:     "'JetBrains Mono', monospace",
  r:        4,
};

const ThemeContext = React.createContext(DARK_T);

// shorthand used throughout components
let T = DARK_T;

// ── Shared Phone shell ────────────────────────────────────────────────────────
function Phone({ children, footer }) {
  const T = React.useContext(ThemeContext);
  return (
    <div style={{
      width: 320, height: 680,
      borderRadius: 38,
      background: "#161616",
      boxShadow: "0 0 0 1.5px #2a2a2a, 0 0 0 3px #111, 0 40px 100px rgba(0,0,0,0.8)",
      display: "flex", flexDirection: "column",
      overflow: "hidden", position: "relative",
      fontFamily: T.mono,
    }}>
      {/* punch hole */}
      <div style={{ position:"absolute", top:12, left:"50%", transform:"translateX(-50%)", width:10, height:10, borderRadius:"50%", background:"#0a0a0a", zIndex:30 }} />
      {/* status bar */}
      <div style={{
        height:36, background:T.bg, flexShrink:0, zIndex:10,
        display:"flex", alignItems:"flex-end", paddingBottom:5, paddingInline:18,
        justifyContent:"space-between",
      }}>
        <span style={{color:T.textDim, fontSize:10}}>9:41</span>
        <div style={{display:"flex", gap:4, alignItems:"center"}}>
          {[3,5,7].map(h=><div key={h} style={{width:3,height:h,background:T.textDim,borderRadius:1}}/>)}
          <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
            <path d="M5.5 7.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5z" fill={T.textDim}/>
            <path d="M2 4.5C3 3.4 4.2 3 5.5 3s2.5.4 3.5 1.5" stroke={T.textDim} strokeWidth="1.1" strokeLinecap="round" fill="none"/>
            <path d="M0 2C1.6.5 3.4 0 5.5 0s3.9.5 5.5 2" stroke={T.textDim} strokeWidth="1.1" strokeLinecap="round" fill="none" opacity=".4"/>
          </svg>
          <div style={{display:"flex",alignItems:"center",gap:1}}>
            <div style={{width:18,height:9,border:`1.2px solid ${T.textDim}`,borderRadius:2,padding:1.5}}>
              <div style={{width:"65%",height:"100%",background:T.textDim,borderRadius:1}}/>
            </div>
          </div>
        </div>
      </div>
      {/* content */}
      <div style={{flex:1, background:T.bg, overflowY:"auto", overflowX:"hidden", position:"relative"}}>
        {children}
      </div>
      {/* nav bar */}
      {footer || (
        <div style={{height:28, background:T.bg, flexShrink:0, display:"flex", justifyContent:"center", alignItems:"center", gap:24, borderTop:`1px solid ${T.border}`}}>
          <div style={{width:16,height:16,border:`1.2px solid ${T.textFaint}`,borderRadius:3}}/>
          <div style={{width:28,height:3,background:T.textFaint,borderRadius:4}}/>
          <div style={{width:12,height:12,borderRadius:"50%",border:`1.2px solid ${T.textFaint}`}}/>
        </div>
      )}
    </div>
  );
}

// ── Shared primitives ─────────────────────────────────────────────────────────
const Btn = ({children, full, dim, danger, style:s={}}) => {
  const T = React.useContext(ThemeContext);
  return (
  <div style={{
    background: danger ? "#ff555520" : dim ? "transparent" : T.accentDim,
    border: `1px solid ${danger ? T.danger : dim ? T.border2 : T.accent}`,
    color: danger ? T.danger : dim ? T.textDim : T.accent,
    borderRadius: T.r,
    padding: "10px 16px",
    fontSize: 11, fontFamily: T.mono, fontWeight: 600,
    textAlign: "center", cursor: "pointer",
    letterSpacing: "0.05em",
    width: full ? "100%" : "auto",
    boxShadow: (!dim && !danger) ? `0 0 12px ${T.accentDim}` : "none",
    ...s,
  }}>{children}</div>
  );
};

const Input = ({label, value, mono=true, multiline, style:s={}}) => {
  const T = React.useContext(ThemeContext);
  return (
  <div style={{marginBottom:12}}>
    {label && <div style={{color:T.textDim, fontSize:9, marginBottom:5, letterSpacing:"0.1em"}}>{label}</div>}
    <div style={{
      background: T.surface,
      border: `1px solid ${T.border2}`,
      borderRadius: T.r,
      padding: "9px 12px",
      color: T.text,
      fontSize: mono ? 11 : 12,
      fontFamily: mono ? T.mono : "'DM Sans', sans-serif",
      minHeight: multiline ? 60 : "auto",
      display:"flex", alignItems: multiline ? "flex-start" : "center", gap:6,
      ...s,
    }}>
      {value || <span style={{color:T.textFaint}}>{label || "…"}</span>}
    </div>
  </div>
  );
};

const Label = ({children, dim}) => {
  const T = React.useContext(ThemeContext);
  return (<div style={{color: dim ? T.textDim : T.accent, fontSize:9, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6, fontWeight:600}}>
    {children}
  </div>);
};

const Divider = () => {
  const T = React.useContext(ThemeContext);
  return <div style={{height:1, background:T.border, margin:"4px 0"}}/>;
};

// ─────────────────────────────────────────────────────────────────────────────
// 00 · SPLASH
// ─────────────────────────────────────────────────────────────────────────────
function ScreenSplash() {
  const T = React.useContext(ThemeContext);
  return (
    <Phone>
      <div style={{
        display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center",
        height:"100%", gap:0,
        background: T.bg,
        position:"relative", overflow:"hidden",
      }}>
        {/* subtle scanline texture */}
        <div style={{
          position:"absolute", inset:0, pointerEvents:"none",
          backgroundImage:`repeating-linear-gradient(0deg, transparent, transparent 3px, ${T.border}22 3px, ${T.border}22 4px)`,
          opacity:0.4,
        }}/>
        {/* glow behind icon */}
        <div style={{
          position:"absolute",
          width:180, height:180,
          borderRadius:"50%",
          background:`radial-gradient(circle, ${T.accentDim} 0%, transparent 70%)`,
          pointerEvents:"none",
        }}/>
        {/* icon */}
        <div style={{
          width:64, height:64, borderRadius:14,
          background:T.accentDim, border:`1px solid ${T.accentMid}`,
          display:"flex", alignItems:"center", justifyContent:"center",
          marginBottom:20,
          boxShadow:`0 0 40px ${T.accentMid}`,
          position:"relative",
        }}>
          <svg width="32" height="32" viewBox="0 0 26 26" fill="none">
            <rect x="3" y="11" width="20" height="13" rx="2" stroke={T.accent} strokeWidth="1.5"/>
            <path d="M8 11V8a5 5 0 0 1 10 0v3" stroke={T.accent} strokeWidth="1.5" strokeLinecap="round"/>
            <circle cx="13" cy="17" r="2" fill={T.accent}/>
            <line x1="13" y1="19" x2="13" y2="21" stroke={T.accent} strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
        </div>
        {/* wordmark */}
        <div style={{
          color:T.accent, fontSize:26, fontWeight:700,
          letterSpacing:"-0.02em", lineHeight:1, marginBottom:6,
          position:"relative",
        }}>
          pass<span style={{color:T.textDim, fontWeight:300}}>.android</span>
        </div>
        <div style={{ color:T.textFaint, fontSize:10, letterSpacing:"0.15em", textTransform:"uppercase", position:"relative" }}>
          the unix password manager
        </div>

        {/* bottom loading indicator */}
        <div style={{
          position:"absolute", bottom:52,
          display:"flex", flexDirection:"column", alignItems:"center", gap:10,
        }}>
          <div style={{
            width:120, height:2, background:T.border2, borderRadius:2, overflow:"hidden",
          }}>
            <div style={{
              width:"60%", height:"100%",
              background:`linear-gradient(90deg, ${T.accentMid}, ${T.accent})`,
              borderRadius:2,
              boxShadow:`0 0 6px ${T.accent}`,
              animation:"loading-bar 1.8s ease-in-out infinite",
            }}/>
          </div>
          <div style={{ color:T.textFaint, fontSize:9 }}>initialising…</div>
        </div>
      </div>
    </Phone>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// 01 · WELCOME
// ─────────────────────────────────────────────────────────────────────────────
function ScreenWelcome() {
  const T = React.useContext(ThemeContext);
  return (
    <Phone>
      <div style={{padding:"0 24px", display:"flex", flexDirection:"column", height:"100%", justifyContent:"space-between", paddingBottom:24}}>
        {/* top */}
        <div style={{paddingTop:40}}>
          {/* logo mark */}
          <div style={{marginBottom:32}}>
            <div style={{
              width:52, height:52, borderRadius:8,
              background: T.accentDim, border:`1px solid ${T.accentMid}`,
              display:"flex", alignItems:"center", justifyContent:"center",
              marginBottom:20,
              boxShadow:`0 0 24px ${T.accentDim}`,
            }}>
              <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                <rect x="3" y="11" width="20" height="13" rx="2" stroke={T.accent} strokeWidth="1.5"/>
                <path d="M8 11V8a5 5 0 0 1 10 0v3" stroke={T.accent} strokeWidth="1.5" strokeLinecap="round"/>
                <circle cx="13" cy="17" r="2" fill={T.accent}/>
                <line x1="13" y1="19" x2="13" y2="21" stroke={T.accent} strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            </div>
            <div style={{color:T.accent, fontSize:22, fontWeight:700, letterSpacing:"-0.02em"}}>pass<span style={{color:T.textDim, fontWeight:300}}>.android</span></div>
            <div style={{color:T.textDim, fontSize:11, marginTop:6, lineHeight:1.6}}>
              the standard unix password<br/>manager — on your phone
            </div>
          </div>

          {/* feature list */}
          <div style={{display:"flex", flexDirection:"column", gap:10}}>
            {[
              ["gpg", "end-to-end encrypted with your gpg key"],
              ["git", "syncs with any git remote"],
              ["pass", "100% compatible with unix pass"],
            ].map(([tag, desc]) => (
              <div key={tag} style={{display:"flex", alignItems:"flex-start", gap:10}}>
                <div style={{
                  background:T.accentDim, border:`1px solid ${T.accentMid}`,
                  borderRadius:3, padding:"2px 6px",
                  color:T.accent, fontSize:9, fontWeight:700,
                  letterSpacing:"0.1em", flexShrink:0, marginTop:1,
                }}>{tag}</div>
                <div style={{color:T.textDim, fontSize:11, lineHeight:1.5}}>{desc}</div>
              </div>
            ))}
          </div>
        </div>

        {/* actions */}
        <div style={{display:"flex", flexDirection:"column", gap:8}}>
          <Btn full>$ clone a store</Btn>
          <div style={{textAlign:"center", color:T.textFaint, fontSize:9, marginTop:4}}>
            requires git + gpg key
          </div>
        </div>
      </div>
    </Phone>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// 02 · CLONE REPO
// ─────────────────────────────────────────────────────────────────────────────
function ScreenClone() {
  const T = React.useContext(ThemeContext);
  return (
    <Phone>
      <div style={{padding:"16px 20px 20px", display:"flex", flexDirection:"column", gap:0}}>
        {/* step */}
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18}}>
          <div style={{color:T.textDim, fontSize:9, letterSpacing:"0.1em"}}>SETUP  ·  1 / 2</div>
          <div style={{display:"flex", gap:4}}>
            {[1,2].map(i => (
              <div key={i} style={{
                width: 20, height:3, borderRadius:4,
                background: T.accent,
                opacity: i===1 ? 1 : 0.3,
              }}/>
            ))}
          </div>
        </div>

        <div style={{color:T.accent, fontSize:16, fontWeight:700, marginBottom:4}}>clone store</div>
        <div style={{color:T.textDim, fontSize:10, marginBottom:20, lineHeight:1.6}}>
          point to your existing pass git repository
        </div>

        {/* git url */}
        <Label>git remote url</Label>
        <div style={{
          background:T.surface, border:`1px solid ${T.border2}`,
          borderRadius:T.r, padding:"10px 12px", marginBottom:16,
          display:"flex", alignItems:"center", gap:6,
        }}>
          <span style={{color:T.textDim, fontSize:10}}>git@</span>
          <span style={{color:T.text, fontSize:11}}>github.com:user/pass-store</span>
          <span style={{width:6,height:13,background:T.accent,display:"inline-block",animation:"blink 1s step-end infinite"}}/>
        </div>

        {/* ssh key section */}
        <Label>ssh public key</Label>
        <div style={{
          background:T.surface, border:`1px solid ${T.border2}`,
          borderRadius:T.r, padding:"10px 12px", marginBottom:8,
        }}>
          <div style={{color:T.textDim, fontSize:9, marginBottom:6}}>ed25519 · generated on device</div>
          <div style={{
            color:T.text, fontSize:9, lineHeight:1.7,
            wordBreak:"break-all", letterSpacing:"0.02em",
          }}>
            ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI<br/>
            Hk9mXvP2qR8wLnJdKoT7yBcAeUfGiMsNpQrV<br/>
            <span style={{color:T.textDim}}>pass-android@device</span>
          </div>
        </div>
        <div style={{display:"flex", gap:6, marginBottom:20}}>
          <Btn style={{flex:1, fontSize:9}}>copy key</Btn>
          <Btn dim style={{flex:1, fontSize:9}}>regenerate</Btn>
        </div>

        <div style={{
          background:`${T.warn}12`, border:`1px solid ${T.warn}44`,
          borderRadius:T.r, padding:"8px 12px", marginBottom:20,
          color:`${T.warn}cc`, fontSize:9, lineHeight:1.6,
        }}>
          ⚠ github → Settings → SSH and GPG Keys → New SSH Key
        </div>

        <Btn full>$ git clone</Btn>
      </div>
    </Phone>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// 03 · GPG KEY
// ─────────────────────────────────────────────────────────────────────────────
function ScreenGpg() {
  const T = React.useContext(ThemeContext);
  const keys = [
    { id:"A3F9 2B1C", uid:"alice@example.com", exp:"2026-01", bits:"4096" },
    { id:"D71E 0FA8", uid:"alice@work.io", exp:"2025-08", bits:"3072" },
  ];
  return (
    <Phone>
      <div style={{padding:"16px 20px 20px"}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18}}>
          <div style={{color:T.textDim, fontSize:9, letterSpacing:"0.1em"}}>SETUP  ·  2 / 2</div>
          <div style={{display:"flex", gap:4}}>
            {[1,2].map(i=>(
              <div key={i} style={{width:20,height:3,borderRadius:4,background:T.accent,opacity:i<2?0.6:1}}/>
            ))}
          </div>
        </div>

        <div style={{color:T.accent, fontSize:16, fontWeight:700, marginBottom:4}}>gpg key</div>
        <div style={{color:T.textDim, fontSize:10, marginBottom:20, lineHeight:1.6}}>
          provide the keypair used to encrypt/decrypt your store
        </div>

        {/* import from file */}
        <div style={{
          background:T.surface, border:`1px solid ${T.border2}`,
          borderRadius:T.r, padding:"12px 14px", marginBottom:10,
          display:"flex", alignItems:"center", gap:10, cursor:"pointer",
        }}>
          <div style={{
            width:28, height:28, borderRadius:T.r,
            background:T.accentDim, border:`1px solid ${T.accentMid}`,
            display:"flex", alignItems:"center", justifyContent:"center",
            flexShrink:0,
          }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect x="2" y="1" width="10" height="12" rx="1.5" stroke={T.accent} strokeWidth="1.2"/>
              <line x1="4.5" y1="5" x2="9.5" y2="5" stroke={T.accent} strokeWidth="1.1" strokeLinecap="round"/>
              <line x1="4.5" y1="7.5" x2="9.5" y2="7.5" stroke={T.accent} strokeWidth="1.1" strokeLinecap="round"/>
              <line x1="4.5" y1="10" x2="7.5" y2="10" stroke={T.accent} strokeWidth="1.1" strokeLinecap="round"/>
            </svg>
          </div>
          <div>
            <div style={{color:T.text, fontSize:11}}>import from file</div>
            <div style={{color:T.textDim, fontSize:9, marginTop:2}}>.asc / .gpg secret key file</div>
          </div>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{marginLeft:"auto"}}>
            <path d="M3.5 8L6.5 5L3.5 2" stroke={T.textFaint} strokeWidth="1.2" strokeLinecap="round"/>
          </svg>
        </div>

        {/* divider */}
        <div style={{display:"flex", alignItems:"center", gap:8, margin:"4px 0 10px"}}>
          <div style={{flex:1, height:1, background:T.border}}/>
          <span style={{color:T.textFaint, fontSize:9}}>or</span>
          <div style={{flex:1, height:1, background:T.border}}/>
        </div>

        {/* paste armored key */}
        <Label>paste armored secret key</Label>
        <div style={{
          background:T.surface, border:`1px solid ${T.border2}`,
          borderRadius:T.r, padding:"10px 12px", marginBottom:6,
          minHeight:80,
        }}>
          <div style={{color:T.textFaint, fontSize:10, lineHeight:1.7}}>
            -----BEGIN PGP PRIVATE KEY BLOCK-----<br/>
            <span style={{color:T.textFaint, opacity:0.4}}>paste key here…</span>
          </div>
        </div>
        <div style={{color:T.textFaint, fontSize:9, marginBottom:20}}>
          exported via: gpg --armor --export-secret-keys your@email.com
        </div>

        <Btn full>finish setup →</Btn>
      </div>
    </Phone>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// 04 · HOME — FOLDER TREE
// ─────────────────────────────────────────────────────────────────────────────
const storeData = [
  { folder:"email",   entries:["gmail","proton","hey"] },
  { folder:"dev",     entries:["github","npm","pypi"] },
  { folder:"finance", entries:["revolut","wise"] },
  { folder:"social",  entries:["twitter","mastodon"] },
];

function ScreenHomeTree() {
  const T = React.useContext(ThemeContext);
  return (
    <Phone>
      <div style={{display:"flex", flexDirection:"column", height:"100%"}}>
        {/* topbar */}
        <div style={{
          padding:"12px 18px 10px",
          borderBottom:`1px solid ${T.border}`,
          display:"flex", alignItems:"center", justifyContent:"space-between",

          <div>
            <div style={{color:T.textDim, fontSize:9, letterSpacing:"0.1em"}}>~/.password-store</div>

          </div>
          <div style={{display:"flex", gap:10, alignItems:"center"}}>

            <div style={{

              <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                <path d="M9.5 5.5A4 4 0 1 1 7 2" stroke={T.textDim} strokeWidth="1.2" strokeLinecap="round"/>

            </div>
            {/* view toggle */}

              <rect x="0.5" y="0.5" width="5" height="5" rx="1" stroke={T.accent} strokeWidth="1.1"/>
              <rect x="7.5" y="0.5" width="5" height="5" rx="1" stroke={T.textDim} strokeWidth="1.1"/>
              <rect x="0.5" y="7.5" width="5" height="5" rx="1" stroke={T.textDim} strokeWidth="1.1"/>
              <rect x="7.5" y="7.5" width="5" height="5" rx="1" stroke={T.textDim} strokeWidth="1.1"/>
