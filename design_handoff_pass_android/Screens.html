<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pass Store — Screens</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'JetBrains Mono', monospace; color: #c8e6c9; }
  .frame {
    width: 320px; height: 720px;
    border: 0;
    background: #0b0d0b;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SCREENS = {
  onboarding: {
    title: "Onboarding",
    items: [
      { id:"s0",  slug:"00-splash",         label:"00 · Splash" },
      { id:"s1",  slug:"01-welcome",        label:"01 · Welcome" },
      { id:"s2",  slug:"02-clone",          label:"02 · Clone repo" },
      { id:"l1",  slug:"02b-clone-loading", label:"02b · Clone — Progress" },
      { id:"s3",  slug:"03-gpg",            label:"03 · GPG key" },
      { id:"l4",  slug:"03b-gpg-loading",   label:"03b · GPG — Loading" },
    ],
  },
  welcomeBlocked: {
    title: "Welcome — Blocked States",
    items: [
      { id:"wb-bio", slug:"01b-blocked-biometric", label:"01b · Biometric missing" },
      { id:"wb-ks",  slug:"01c-blocked-keystore",  label:"01c · Keystore unavailable" },
      { id:"wb-api", slug:"01d-blocked-api",       label:"01d · Android too old" },
    ],
  },
  main: {
    title: "Main App",
    items: [
      { id:"s4",     slug:"04-home-tree",        label:"04 · Home — Tree" },
      { id:"l3",     slug:"04b-home-syncing",    label:"04b · Home — Syncing" },
      { id:"s5",     slug:"05-home-flat",        label:"05 · Home — Flat" },
      { id:"s6pre",  slug:"06a-passphrase",      label:"06a · GPG Passphrase Unlock" },
      { id:"s6bio",  slug:"06b-biometric",       label:"06b · Biometric Unlock" },
      { id:"l2",     slug:"07-entry-decrypting", label:"07 · Entry — Decrypting" },
      { id:"s6",     slug:"07-entry",            label:"07b · Entry Detail" },
      { id:"s9",     slug:"09-settings",         label:"08 · Settings" },
      { id:"s9b",    slug:"09b-settings-pull",   label:"08b · Settings — Pull on open" },
      { id:"s9c",    slug:"09c-settings-default-view", label:"08c · Settings — Default view" },
      { id:"s9d",    slug:"09d-settings-clipboard",    label:"08d · Settings — Clipboard timeout" },
      { id:"s9e",    slug:"09e-settings-session",      label:"08e · Settings — Session timeout" },
    ],
  },
  v2: {
    title: "v2.0 — Entry Creation",
    items: [
      { id:"v2-tree",  slug:"v2-home-tree",  label:"01 · Home — Tree (v2)" },
      { id:"v2-flat",  slug:"v2-home-flat",  label:"02 · Home — Flat (v2)" },
      { id:"v2-entry", slug:"07-entry-v2",   label:"03 · Entry Detail (v2)" },
      { id:"s7",       slug:"07-new-entry",  label:"04 · New Entry" },
      { id:"s8",       slug:"08-generator",  label:"05 · Generator" },
    ],
  },
};

function ScreenFrame({ slug }) {
  return (
    <iframe
      className="frame"
      src={`screens/${slug}.html`}
      title={slug}
      style={{ width: 320, height: 680, border: 0, background: "#0b0d0b", display: "block" }}
      scrolling="no"
    />
  );
}

function App() {
  const [theme, setTheme] = React.useState(() => {
    try { return localStorage.getItem('passAndroidTheme') || 'dark'; }
    catch (e) { return 'dark'; }
  });
  const [showTweaks, setShowTweaks] = React.useState(false);

  // broadcast theme to every iframe whenever it changes
  React.useEffect(() => {
    try { localStorage.setItem('passAndroidTheme', theme); } catch (e) {}
    const broadcast = () => {
      document.querySelectorAll('iframe.frame').forEach(f => {
        try { f.contentWindow.postMessage({ type:'__set_theme', theme }, '*'); } catch (e) {}
      });
    };
    broadcast();
    // also re-broadcast as iframes finish loading
    document.querySelectorAll('iframe.frame').forEach(f => {
      f.addEventListener('load', broadcast);
    });
    return () => document.querySelectorAll('iframe.frame').forEach(f => f.removeEventListener('load', broadcast));
  }, [theme]);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <React.Fragment>
      <DesignCanvas title="Pass Store — Screens">
        {Object.entries(SCREENS).map(([sectionId, section]) => (
          <DCSection key={sectionId} id={sectionId} title={section.title}>
            {section.items.map(({id, slug, label}) => (
              <DCArtboard key={id} id={id} label={label} width={320} height={680}>
                <ScreenFrame slug={slug}/>
              </DCArtboard>
            ))}
          </DCSection>
        ))}
      </DesignCanvas>
      {showTweaks && (
        <div style={{
          position:'fixed', bottom:24, right:24, zIndex:9999,
          background:'#1a1a1a', border:'1px solid #333',
          borderRadius:12, padding:'16px 20px', minWidth:200,
          fontFamily:"'JetBrains Mono', monospace",
          boxShadow:'0 8px 32px rgba(0,0,0,0.5)',
        }}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
            <span style={{color:'#fff', fontSize:13, fontWeight:600}}>Tweaks</span>
            <span style={{color:'#666', cursor:'pointer', fontSize:16}} onClick={() => {
              setShowTweaks(false);
              window.parent.postMessage({type:'__edit_mode_dismissed'},'*');
            }}>×</span>
          </div>
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
            <span style={{color:'#aaa', fontSize:11}}>Light mode</span>
            <div onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} style={{
              width:36, height:20, borderRadius:10, cursor:'pointer',
              background: theme === 'light' ? '#39ff6b' : '#333',
              position:'relative', transition:'background 0.2s',
            }}>
              <div style={{
                width:14, height:14, borderRadius:'50%', background:'#fff',
                position:'absolute', top:3,
                left: theme === 'light' ? 19 : 3,
                transition:'left 0.2s',
              }}/>
            </div>
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
